services:

  # ---------------------------------------------------------------------------
  # Redis — shared message bus for LiveKit server + SIP service
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    network_mode: host
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # LiveKit Server — WebRTC media server
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server
    network_mode: host
    environment:
      NODE_IP: "${EC2_PUBLIC_IP}"
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - "0.0.0.0"
        rtc:
          tcp_port: 7881
          port_range_start: 7882
          port_range_end: 7932
          use_external_ip: false
          node_ip: "${EC2_PUBLIC_IP}"
        redis:
          address: "localhost:6379"
          password: "${REDIS_PASSWORD}"
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        logging:
          level: info
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - "${LIVEKIT_WEBHOOK_URL}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LiveKit SIP — SIP <-> WebRTC bridge for Exotel PSTN calls
  # ---------------------------------------------------------------------------
  sip:
    image: livekit/sip
    network_mode: host
    environment:
      SIP_CONFIG_BODY: |
        api_key: '${LIVEKIT_API_KEY}'
        api_secret: '${LIVEKIT_API_SECRET}'
        ws_url: 'ws://localhost:7880'
        redis:
          address: 'localhost:6379'
          password: '${REDIS_PASSWORD}'

        sip_port: 5160
        rtp_port:
          start: 10000
          end: 11000

        # ---------------------------------------------------------
        # NETWORK CONFIGURATION (EC2 + GLOBAL ACCELERATOR)
        # ---------------------------------------------------------
        # Bind to private IP, advertise the EC2 public / GA static IP
        # in SIP/SDP so Exotel can route media back correctly.
        use_external_ip: false
        nat_1_to_1_ip: "${EC2_PUBLIC_IP}"

        # ---------------------------------------------------------
        # EXOTEL FROM HEADER DOMAIN (CRITICAL)
        # ---------------------------------------------------------
        # Exotel requires the From header domain to be:
        #   <account_sid>.pstn.exotel.com
        # LiveKit SIP uses sip_hostname as the From header domain.
        sip_hostname: "${SIP_HOSTNAME}"

        log_level: info
        health_port: 8080
        max_concurrent_calls: 100
    depends_on:
      livekit:
        condition: service_started
    restart: unless-stopped